<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doña Juana Sostenible: IA Posconsumo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');

        :root {
            --ai-grad: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .hero-card {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            border-bottom-left-radius: 60px;
            border-bottom-right-radius: 20px;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
        }

        .ai-panel {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 32px;
        }

        .btn-ai {
            background: var(--ai-grad);
            transition: all 0.3s ease;
        }

        .btn-ai:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { color: transparent; text-shadow: .25em 0 0 transparent, .5em 0 0 transparent; }
            40% { color: white; text-shadow: .25em 0 0 transparent, .5em 0 0 transparent; }
            60% { text-shadow: .25em 0 0 white, .5em 0 0 transparent; }
            80%, 100% { text-shadow: .25em 0 0 white, .5em 0 0 white; }
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md w-full glass-card overflow-hidden shadow-2xl">
        <header class="hero-card p-10 text-center">
            <div class="bg-emerald-500 text-white text-[9px] font-black px-3 py-1 rounded-full inline-block mb-3 uppercase tracking-widest">
                Eco-Tecnología Bogotá
            </div>
            <h1 class="text-3xl font-black italic leading-none text-white uppercase tracking-tighter">
                Doña Juana<br><span class="text-cyan-400">Sostenible</span>
            </h1>
        </header>

        <div class="p-6 space-y-6">
            <section class="ai-panel p-6 shadow-xl">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="w-10 h-10 rounded-xl bg-purple-600 flex items-center justify-center">
                        <i class="fas fa-robot text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-xs font-bold uppercase tracking-widest text-purple-400">Eco-Analizador</h2>
                        <p class="text-[10px] text-slate-500">Consulta residuos con IA</p>
                    </div>
                </div>

                <div class="space-y-3">
                    <input id="residuos-input" type="text" 
                           placeholder="Ej: Pilas, aceite de cocina, bombillos..." 
                           class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-purple-500 text-white shadow-inner">
                    
                    <button id="btn-analizar" onclick="analizarResiduo()" 
                            class="w-full py-4 btn-ai rounded-2xl text-xs font-black uppercase tracking-widest text-white shadow-lg">
                        Analizar ahora ✨
                    </button>
                </div>

                <div id="loader" class="hidden mt-6 text-center">
                    <p class="text-[10px] font-bold text-purple-400 uppercase tracking-[0.3em] loading-dots">Consultando base de datos ambiental</p>
                </div>

                <div id="resultado-box" class="hidden mt-6 p-5 bg-purple-900/20 border border-purple-500/30 rounded-2xl">
                    <p id="resultado-texto" class="text-xs leading-relaxed text-purple-100 italic"></p>
                </div>
            </section>

            <footer class="text-center pt-2">
                <button onclick="compartir()" class="text-[10px] font-bold text-slate-500 hover:text-white transition-colors uppercase tracking-widest">
                    <i class="fas fa-share-alt mr-2"></i> Compartir herramienta
                </button>
                <p class="text-[9px] text-slate-700 mt-6 uppercase tracking-[0.2em]">CGR Doña Juana © 2024</p>
            </footer>
        </div>
    </div>

    <script>
        // REEMPLAZA ESTO CON TU CLAVE REAL DE GOOGLE AI STUDIO
        const API_KEY = "AIzaSyCYXulY28ouN4g-DI9Ro2yvUP0IYPN7rqE"; 

        async function analizarResiduo() {
            const input = document.getElementById('residuos-input');
            const btn = document.getElementById('btn-analizar');
            const loader = document.getElementById('loader');
            const box = document.getElementById('resultado-box');
            const txt = document.getElementById('resultado-texto');

            const query = input.value.trim();
            if (!query) return;

            if (API_KEY === "AIzaSyCYXulY28ouN4g-DI9Ro2yvUP0IYPN7rqE" || API_KEY === "") {
                txt.innerText = "⚠️ Error: No has configurado la API Key en el código. Genera una en Google AI Studio e insértala.";
                box.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            input.disabled = true;
            loader.classList.remove('hidden');
            box.classList.add('hidden');

            const prompt = `Eres un experto ambiental en Bogotá. Usuario pregunta por: "${query}". Responde en max 45 palabras: 1. Impacto ambiental (litros agua/CO2). 2. Dónde llevarlo en Bogotá. Usa emojis.`;

            try {
                // Endpoint estándar de Gemini 1.5 Flash
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    console.error("Detalle del error:", data);
                    throw new Error(data.error?.message || "Error desconocido");
                }

                const respuestaIA = data.candidates?.[0]?.content?.parts?.[0]?.text;
                txt.innerText = respuestaIA || "No recibí una respuesta clara. Intenta de nuevo.";
                box.classList.remove('hidden');

            } catch (error) {
                console.error("Error capturado:", error);
                txt.innerText = `⚠️ Error: ${error.message}. Verifica que tu API Key sea correcta y que tengas conexión a internet.`;
                box.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
                input.disabled = false;
            }
        }

        function compartir() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: 'Doña Juana Sostenible', url: url });
            } else {
                alert("Enlace copiado: " + url);
            }
        }
    </script>
</body>
</html>
